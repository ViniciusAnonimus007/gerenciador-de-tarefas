<!DOCTYPE html>
<html>
<head lang="pt-br">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../styles/tasks.css">
  <title>Gerenciador de Tarefas</title>
</head>
<body>
  <header>
    <h1>Gerenciador de tarefas</h1>
  </header>
  
  <main class="container">
    <section class="tasks_container">
      
    </section>
    
    
    <section class="container_create">
      <div class="task_create_container">
        <div class="task_create">
          <div id="task_title">
            
            <label for="title">Titulo</label>
            <input type="text" name="title" id="title" placeholder="Digite o Título" autocomplete="off"/>
        
          </div>
          
          <div id="task_description">
            <label for="description">Descrição</label>
            <input type="text" name="description" id="description" placeholder="Digite a descrição" autocomplete="off">
            
          </div>
          
          <div id="task_importance">
            <label for="importance">Urgência </label>
            <select name="importance" id="importance" autocomplete="off">
              
              <option disabled selected value="">Não Selecionado</option>
              
              <option value="low">Baixa</option>
              <option value="mid">Média</option>
              <option value="high">Alta</option>
            </select>
            
          </div>
        </div>
        
        <button id="create_button">Criar</button>
      </div>
    </section>
    
  </main>
  
  <script src="../src/app.js" type="module"></script>
  <script src="../src/application/session.js" type="module">
    
  </script>
</body>
</html>
